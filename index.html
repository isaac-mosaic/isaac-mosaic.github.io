<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WINSRH OS | Harmony</title>
    <style>
        body { 
            background-color: #4a0404; color: white;
            font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            height: 100vh; margin: 0;
        }

        /* Red and Green Glowing Header */
        #winsrh-title { 
            font-size: 70px; font-weight: 900; margin-bottom: 20px;
            color: black;
            text-shadow: 0 0 10px red, 0 0 20px red, 0 0 40px green, 0 0 80px green;
            text-transform: uppercase; letter-spacing: 5px;
        }

        #ascii-logo { 
            font-family: monospace; font-size: 8px; line-height: 8px;
            margin-right: 15px; color: #00a4ef;
            animation: spin 4s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .search-box { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 50px; }
        input { padding: 12px; width: 300px; border-radius: 20px; border: 1px solid #777; }
        .btn { padding: 10px 20px; cursor: pointer; border-radius: 15px; border: 1px solid #777; background: #222; color: white; }
        
        #speed-status { margin-top: 15px; font-weight: bold; font-family: monospace; }
        .github-link { position: absolute; top: 20px; left: 20px; fill: white; }
    </style>
</head>
<body>

    <a href="https://github.com/isaac-mosaic" class="github-link">
        <svg height="40" viewBox="0 0 16 16" width="40"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>

    <div id="winsrh-title">WINSRH</div>

    <div class="search-box">
        <pre id="ascii-logo">
  __  __ 
 /  \/  \
 \      /
  \____/ 
        </pre>
        <form id="searchForm" target="_blank">
            <input type="text" id="query" placeholder="search the www!" required>
            <select id="engine" class="btn">
                <option value="https://www.google.com/search?q=">Google</option>
                <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
            </select>
            <button type="submit" class="btn">Go!</button>
        </form>
    </div>
    
    <div id="speed-status">Testing connection...</div>

    <script>
        const status = document.getElementById('speed-status');
        const form = document.getElementById('searchForm');
        let isReady = false;

        // Connectivity Test
        const start = Date.now();
        fetch('https://www.google.com/favicon.ico', { mode: 'no-cors' }).then(() => {
            const duration = Date.now() - start;
            status.innerText = duration < 500 ? "Status: Good" : "Status: Bad";
            status.style.color = duration < 500 ? "#00ff00" : "yellow";
            isReady = true;
        });

        form.onsubmit = function(e) {
            e.preventDefault();
            if (!isReady) { alert("Wait for connection test!"); return; }
            let val = document.getElementById('query').value;
            let engine = document.getElementById('engine').value;
            
            // Save History
            let history = JSON.parse(localStorage.getItem('searchHistory') || '[]');
            history.push(val);
            localStorage.setItem('searchHistory', JSON.stringify(history));
            
            window.open(engine + val, '_blank');
        }
    </script>
</body>
</html>
